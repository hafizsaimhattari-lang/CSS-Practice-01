<!--
    Internal (Embedded) CSS:
    Is type me HTML file ke <head> hisse ke andar <style> tag banaya jata hai.
    Phir sari CSS isi <style> tag ke andar likhi jati hai.
    Ye chote pages aur practice examples ke liye theek hota hai.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS Test</title>
    
    <!-- CSS yahan head ke andar style tag mein likhi hai! -->
    <style>
        h1 {
            color: green;
            text-align: center;
            background-color: lightgray;
        }
        p {
            color: purple;
            font-size: 20px;
        }
    </style>

</head>
<body>

    <h1>Yeh Internal CSS Hai!</h1>
    <p>HTML aur CSS ek hi file mein hain, lekin code thora saaf hai!</p>


<!--
    Summary:
    This is a practice file for 2 Internal CSS.
-->
</body>
</html>
