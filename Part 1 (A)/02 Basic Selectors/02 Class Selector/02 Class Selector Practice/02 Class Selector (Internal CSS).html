<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Practice For Class Selector</title>

    <style>

        body {
            background-color:black;
        }

        /* text size "small" */

        .small-heading {

            color:white;
            font-size:small;
            background-color:blue;
            padding: 10px;
            border-radius: 5px;
            text-align:center;
        }
        
        .Horizontal-Line {

            border:2px solid white;
            border-radius : 10px;
        }

        /* text size "Large" */
        .large-heading  {
            color:white;
            font-size:larger;
            background-color:red;
            padding: 10px;
            border-radius: 5px;
            text-align:center;
        }

    </style>
</head>
<body>

    <!-- text size "small" -->

    <h1 class="small-heading">This is 1st Heading 1</h1>
    <h2 class="small-heading">This is 2nd Heading 2</h2>
    <h3 class="small-heading">This is 3rd Heading 3</h3>

    <br>
    <hr class="Horizontal-Line">
    <br>


    <!-- text size "large" -->

    <h4 class="large-heading">This is 4th Heading 4</h4>
    <h5 class="large-heading">This is 5th Heading 5</h5>
    <h6 class="large-heading">This is 6th Heading 6</h6>
    


<!--
    Summary:
    This is a practice file for 02 Class Selector Practice.
-->
</body>
</html>
