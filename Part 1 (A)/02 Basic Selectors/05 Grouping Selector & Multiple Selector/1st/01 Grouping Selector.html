<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Selector (Multiple Selectors)</title>
    <link rel="stylesheet" href="01 Grouping Selector.css">
</head>
<body>
    <!-- .headings class heading elements ko group style dene ke liye use ho rahi hai -->
    <h1 class="headings">Grouping Selector Practice</h1>

    <!-- .paragraph class paragraphs ko same design deti hai -->
    <p class="paragraph">This is a paragraph.</p>

    <!-- Same paragraph class reuse ho rahi hai -->
    <p class="paragraph">This is another paragraph.</p>

    <!-- h2 bhi .headings class ka part hai -->
    <h2 class="headings">This is a heading 2</h2>

    <!-- h3 bhi same grouped style receive karega -->
    <h3 class="headings">This is a heading 3</h3>


<!--
    Summary:
    This is a practice file for 1st.
-->
</body>
</html>
