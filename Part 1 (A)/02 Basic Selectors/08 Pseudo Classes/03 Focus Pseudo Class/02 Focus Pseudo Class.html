<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Page ki character encoding set karta hai -->
    <meta charset="UTF-8">

    <!-- Responsive layout ke liye viewport setting -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser tab ka title -->
    <title>Pseudo Classes Test</title>

    <!-- Is HTML file ke sath connected CSS file -->
    <link rel="stylesheet" href="02 Focus-Pseudo-Class.css">
</head>
<body>
    <!-- Page ka main heading -->
    <h1>Pseudo Classes Test</h1>

    <!--
        Ye input field :focus pseudo class test karne ke liye hai.
        Is par click karne ya keyboard se Tab karne par focus style apply hogi.
    -->
    <input type="text" placeholder="Click Here" class="input-field">

    <!-- Simple spacing ke liye line breaks use kiye gaye hain -->
    <br><br>

    <!--
        Ye button :hover aur :active test karne ke liye hai.
        Mouse upar le jao to hover chalega.
        Click press karo to active chalega.
    -->
    <button type="button">Hover / Click Me</button>

    <!--
        Ye link hover aur active states test karne ke liye hai.
        Mouse link ke upar ho to hover, click press ho to active.
    -->
    <a href="#">Simple Link</a>

</body>
</html>
