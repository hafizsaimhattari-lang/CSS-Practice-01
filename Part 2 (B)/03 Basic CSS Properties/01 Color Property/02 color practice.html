<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Page ki character encoding -->
    <meta charset="UTF-8">

    <!-- Mobile aur desktop dono screens ke liye responsive setting -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser tab ka title -->
    <title>Color Property Practice</title>

    <!-- Internal CSS sirf practice ke liye use ki gayi hai -->
    <style>
        /* Body ka background dark rakha hai taake colors clearly nazar aayen */
        body {
            background-color: black;
        }

        /* h1 par color property use ki gayi hai */
        h1 {
            color: white;
        }

        /* h2 ka text yellow color ka hoga */
        h2 {
            color: yellow;
        }

        /* Paragraph ka text lightgreen color ka hoga */
        p {
            color: lightgreen;
        }

        /* Class selector ke sath color property */
        .red-text {
            color: red;
        }

        /* Class selector ke sath blue color */
        .blue-text {
            color: blue;
        }

        /* ID selector ke sath orange color */
        #orange-text {
            color: orange;
        }
    </style>
</head>
<body>
    <!-- Main heading white color me show hogi -->
    <h1>Color Property Practice</h1>

    <!-- Sub heading yellow color me show hogi -->
    <h2>Basic Color Example</h2>

    <!-- Normal paragraph lightgreen color me show hoga -->
    <p>This paragraph is using the color property.</p>

    <!-- Class selector ki wajah se ye paragraph red hoga -->
    <p class="red-text">This paragraph is red.</p>

    <!-- Class selector ki wajah se ye paragraph blue hoga -->
    <p class="blue-text">This paragraph is blue.</p>

    <!-- ID selector ki wajah se ye paragraph orange hoga -->
    <p id="orange-text">This paragraph is orange.</p>
</body>
</html>
